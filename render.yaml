services:
  - type: web
    name: portfolio-analysis
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: streamlit run render_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
